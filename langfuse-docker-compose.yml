version: "3.8"

# LangFuse 自部署
# 数据存在 PostgreSQL（复用 alphastock 数据库实例，单独的 langfuse 库）
# 访问地址：http://你的服务器IP:3000

services:
  langfuse:
    image: langfuse/langfuse:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      # 数据库（单独建一个 langfuse 库，不和 alphastock 混）
      DATABASE_URL: postgresql://langfuse:langfuse123@host.docker.internal:5432/langfuse

      # 必填：随机字符串，用于加密 session
      NEXTAUTH_SECRET: "alphastock-langfuse-secret-change-me"
      NEXTAUTH_URL: "http://localhost:3000"

      # 可选：关闭注册（只有你自己用）
      AUTH_DISABLE_SIGNUP: "false"

      # 端口
      PORT: "3000"

    extra_hosts:
      - "host.docker.internal:host-gateway"
